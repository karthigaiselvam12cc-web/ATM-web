<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPay Credit Message</title>

<style>
    body {
        font-family: Arial;
        background: #f1f3f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .phone {
        width: 320px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        overflow: hidden;
    }

    .header {
        background: #0f9d58;
        color: white;
        padding: 15px;
        text-align: center;
        font-weight: bold;
    }

    .message {
        padding: 20px;
    }

    .sms {
        background: #e6f4ea;
        padding: 15px;
        border-radius: 10px;
        margin-top: 10px;
        font-size: 14px;
    }

    .btn {
        background: #0f9d58;
        color: white;
        border: none;
        padding: 10px;
        width: 100%;
        margin-top: 15px;
        cursor: pointer;
        border-radius: 5px;
    }

    .btn:hover {
        background: #0c7c43;
    }
</style>
</head>

<body>

<div class="phone">
    <div class="header">GPay Message</div>

    <div class="message">
        <div class="sms" id="smsBox">
            ₹5,000 credited to your account via ATM deposit.<br>
            Available Balance: ₹12,450
        </div>

        <button class="btn" onclick="generateMsg()">Generate New Message</button>
    </div>
</div>

<script>
function generateMsg() {
    let amount = Math.floor(Math.random() * 10000) + 1000;
    let balance = amount + Math.floor(Math.random() * 20000);

    document.getElementById("smsBox").innerHTML =
        `₹${amount} credited to your account via ATM deposit.<br>
         Available Balance: ₹${balance}`;
}
</script>

</body>
</html>
